<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Subir documentos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/estilo.css" />

    <script defer src="../js/main.js"></script>
  </head>

  <body>
    <section>
      <div class="card">
        <img src="../imagenes/logo.png" alt="Health Tramiter" class="logo" />

        <h3 class="title-h3">Subir documentos</h3>

        <form action="#" method="post" enctype="multipart/form-data">
          <select class="input" name="tramite" required>
            <option value="">Seleccione trámite</option>
            <option value="autorizar">Autorizar</option>
            <option value="citas">Solicitar citas</option>
            <option value="medicamentos">Reclamar medicamentos</option>
          </select>

          <input type="file" name="archivo" class="input" required />

          <div class="center-component">
            <button type="submit" class="btn">Subir documento</button>
          </div>
        </form>
      </div>
    </section>
  </body>
</html>
