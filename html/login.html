<!doctype html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Health Tramiter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/estilo.css">

</head>

<body>

<section class="contenedor-login">

<div class="login-box">

<div class="logo">
    <img src="../imagenes/logo.png" alt="Health Tramiter">
</div>

<h3 class="title-h3">Inicio de sesión</h3>

<form class="form-login">

    <input 
        type="email" 
        placeholder="Correo electrónico"
    >

    <div class="password-container">

        <input 
            type="password" 
            placeholder="Contraseña"
        >

        <img 
            src="../imagenes/view.png" 
             alt="Mostrar contraseña"
            class="icon-password"
        >

    </div>

    <button type="submit">
        Iniciar sesión
    </button>

</form>

<div class="login-links">

    <a href="recuperar.html">
        Recuperar contraseña
    </a>

</div>

<div class="register-text">

    <span>¿No tengo una cuenta?</span>

    <a href="registroUsuario.html">
        Registrarse
    </a>

</div>

</div>

</section>

</body>
</html>
