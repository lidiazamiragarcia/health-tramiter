<!doctype html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro usuario - Health Tramiter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/estilo.css">

</head>

<body>

<section class="contenedor-registroUsuario">

<div class="registroUsuario-box">

<div class="logo">
    <img src="../imagenes/logo.png" alt="Health Tramiter">
</div>

<h3 class="title-h3">Registro de usuario</h3>

<form class="form-registro">

    <div class="form-grid">

        <div class="input-group">

            <label>Nombres</label>

            <input type="text">

        </div>

        <div class="input-group">

            <label>Apellidos</label>

            <input type="text">

        </div>

        <div class="input-group">

            <label>Cédula</label>

            <input type="text">

        </div>

        <div class="input-group">

            <label>Fecha de nacimiento</label>

            <input type="date">

        </div>

        <div class="input-group">

            <label>Dirección</label>

            <input type="text">

        </div>

        <div class="input-group">

            <label>Celular</label>

            <input type="text">

        </div>

        <div class="input-group">

            <label>Correo electrónico</label>

            <input type="email">

        </div>

        <div class="input-group">

            <label>Contraseña</label>

            <input type="password">

        </div>

    </div>

    <button type="submit" class="btn-registro">
        Registrarse
    </button>

</form>

<div class="login-register">

    <span>¿Ya tiene cuenta?</span>

    <a href="login.html">
        iniciar sesión
    </a>

</div>

</div>

</section>

</body>
</html>
