<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actualizar datos - Health Tramiter</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/estilo.css" />

    <script defer src="../js/main.js"></script>
  </head>

  <body>
    <section class="contenedor-actualizardatos">
      <div class="actualizardatos-box">
        <img src="../imagenes/logo.png" alt="Health Tramiter" />

        <h3 class="title-h3"> Actualizar datos</h3>

        <form class="form-grid">
          <input type="text" placeholder="Nombres" required />
          <input type="text" placeholder="Apellidos" required />
          <input type="text" placeholder="Cédula" required />
          <input type="date" />
          <input type="text" placeholder="Dirección" />
          <input type="tel" placeholder="Teléfono" />
          <input type="email" placeholder="Correo electrónico" required />
          <input type="password" placeholder="Contraseña" required />
        </form>
        <div class="center-component">
          <button type="submit">Actualizar datos</button>
        </div>
      </div>
    </section>
  </body>
</html>
