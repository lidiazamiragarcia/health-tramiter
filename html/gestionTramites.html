<!doctype html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de trámites - Health Tramiter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/estilo.css">

</head>

<body>

<section class="contenedor-gestion">

<div class="gestion-box">

<div class="logo">
    <img src="../imagenes/logo.png" alt="Health Tramiter">
</div>

<h3 class="title-h3">Gestión de trámites</h3>

<form class="form-gestion">

    <div class="form-row">

        <label>Buscar trámite:</label>

        <input type="text">

    </div>

    <div class="form-row">

        <label>Estado</label>

        <select>
            <option></option>
        </select>

    </div>

</form>

<div class="resultado-gestion">

    <h4>Resultados</h4>

    <div class="resultado-info">

        <div class="resultado-row">
            <span class="label">Usuario:</span>
            <span>Juan Pérez</span>
        </div>

        <div class="resultado-row">
            <span class="label">Tipo:</span>
            <span>Autorización</span>
        </div>

        <div class="resultado-row">
            <span class="label">Fecha:</span>
            <span>10/08/2025</span>
        </div>

        <div class="resultado-row">
            <span class="label">Estado:</span>
            <span class="estado-proceso">
                En proceso
            </span>
        </div>

    </div>

</div>

<div class="buttons-gestion">

    <button type="button" class="btn-detalle">
        Ver detalle
    </button>

    <button type="button" class="btn-aprobar">
        Aprobar
    </button>

    <button type="button" class="btn-rechazar">
        Rechazar
    </button>

</div>

</div>

</section>

</body>
</html>
