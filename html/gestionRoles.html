<!doctype html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de roles - Health Tramiter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/estilo.css">

</head>

<body>

<section class="contenedor-roles">

<div class="roles-box">

<div class="logo">
    <img src="../imagenes/logo.png" alt="Health Tramiter">
</div>

<h3 class="title-h3">Gestión de roles</h3>

<form class="form-roles">

    <div class="form-row">

        <label>Rol:</label>

        <select>
            <option>Seleccionar rol</option>
        </select>

    </div>

    <div class="form-row">

        <label>Correo electrónico:</label>

        <select>
            <option>Correo electrónico</option>
        </select>

    </div>

    <div class="button-asignar">

        <button type="submit">
            Asignar
        </button>

    </div>

</form>

<div class="usuario-asignado">

    <p>Juan - Persona natural</p>

</div>

<div class="buttons-roles">

    <button type="button" class="btn-editar">
        Editar
    </button>

    <button type="button" class="btn-eliminar">
        Eliminar
    </button>

</div>

</div>

</section>

</body>
</html>
