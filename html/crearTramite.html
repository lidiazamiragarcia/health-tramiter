<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crear trámite - Health Tramiter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/estilo.css">

</head>

<body>

<section class="contenedor-tramite">

<div class="tramite-box">

<div class="logo">
<img src="../imagenes/logo.png" alt="Health Tramiter">
</div>

<h3 class="title-h3">Creación de trámite</h3>

<form class="form-tramite">

    <div class="form-row">
        <label>Tipo de trámite</label>

        <select>
            <option>Seleccionar</option>
        </select>
    </div>

    <div class="form-row">
        <label>Descripción</label>

        <textarea placeholder="Describe aquí el trámite"></textarea>
    </div>

    <div class="form-row">
        <label>EPS / Entidad</label>

        <select>
            <option>Seleccionar</option>
        </select>
    </div>

    <div class="form-row">
        <label>Fecha</label>

        <input type="date">
    </div>

    <div class="form-row">
        <label>Archivo</label>

        <input type="file">
    </div>

    <div class="buttons-tramite">

        <button type="submit">
            Crear trámite
        </button>

        <button type="button" class="btn-cancelar">
            Cancelar
        </button>

    </div>

</form>

</div>

</section>

</body>
</html>
