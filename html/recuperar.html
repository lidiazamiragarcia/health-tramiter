<!doctype html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuperar contraseña - Health Tramiter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/estilo.css">

</head>

<body>

<section class="contenedor-recuperarcontraseña">

<div class="recuperarcontraseña-box">

<div class="logo">
    <img src="../imagenes/logo.png" alt="Health Tramiter">
</div>

<h3 class="title-h3">Recuperar contraseña</h3>

<p class="descripcion-recuperar">
    Ingresa su correo electrónico para recuperar la contraseña
</p>

<form class="form-recuperar">

    <div class="input-group">

        <label>Correo electrónico</label>

        <input 
            type="email"
            placeholder="Correo electrónico"
        >

    </div>

    <div class="password-container">

        <input 
            type="password"
            placeholder="Contraseña"
        >

        <img 
            src="../imagenes/view.png"
            alt="Mostrar contraseña"
            class="icon-password"
        >

    </div>

    <button type="submit">
        Recuperar contraseña
    </button>

</form>

</div>

</section>

</body>
</html>
