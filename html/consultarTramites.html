<!doctype html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta de trámites - Health Tramiter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/estilo.css">

</head>

<body>

<section class="contenedor-consulta">

<div class="consulta-box">

<div class="logo">
    <img src="../imagenes/logo.png" alt="Health Tramiter">
</div>

<h3 class="title-h3">Consulta de trámites</h3>

<form class="form-consulta">

    <div class="input-group">

        <label>Seleccionar tipo</label>

        <select>
            <option>Tipo de trámite</option>
        </select>

    </div>

</form>

<div class="resultado-box">

    <h4>Resultado</h4>

    <div class="resultado-info">

        <div class="resultado-row">
            <span class="label">Tipo:</span>
            <span>Cita médica</span>
        </div>

        <div class="resultado-row">
            <span class="label">Fecha:</span>
            <span>10/08/2025</span>
        </div>

        <div class="resultado-row">
            <span class="label">Estado:</span>
            <span class="estado-proceso">
                En proceso
            </span>
        </div>

    </div>

</div>

<div class="buttons-consulta">

    <button type="button">
        Ver detalle
    </button>

    <button type="button">
        Crear nuevo trámite
    </button>

</div>

</div>

</section>

</body>
</html>
